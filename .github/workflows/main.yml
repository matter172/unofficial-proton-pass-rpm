name: Update Proton Pass RPM Repository

on:
  schedule:
    - cron: '0 0 * * *'   # every day at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-repo:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq createrepo-c

      - name: Fetch manifest and decide whether to publish
        id: check_version
        run: |
          MANIFEST_URL="https://proton.me/download/PassDesktop/linux/x64/version.json"
          VERSION_DATA=$(curl -sL "$MANIFEST_URL")

          VERSION=$(echo "$VERSION_DATA" | jq -r '.Releases[0].Version')
          DOWNLOAD_URL=$(echo "$VERSION_DATA" | jq -r '.Releases[0].File[] | select(.Url | endswith(".rpm")) | .Url')
          EXPECTED_SHA512=$(echo "$VERSION_DATA" | jq -r '.Releases[0].File[] | select(.Url | endswith(".rpm")) | .Sha512CheckSum')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "::error::Could not find a .rpm entry in Proton's manifest - the API may have changed."
            exit 1
          fi

          LAST_VERSION=""
          if [ -f last_version.txt ]; then
            LAST_VERSION=$(cat last_version.txt)
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Only skip work on an unchanged version during a scheduled run.
          # A manual workflow_dispatch always rebuilds/republishes, even if
          # nothing changed upstream - handy for fixing a broken Pages deploy.
          if [ "$VERSION" = "$LAST_VERSION" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Already up to date at $VERSION, nothing to do."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$LAST_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

          mkdir -p x86_64
          FILENAME=$(basename "$DOWNLOAD_URL")
          echo "Downloading $FILENAME ($VERSION)..."
          curl -sL "$DOWNLOAD_URL" -o "x86_64/$FILENAME"

          ACTUAL_SHA512=$(sha512sum "x86_64/$FILENAME" | awk '{print $1}')
          if [ "$ACTUAL_SHA512" != "$EXPECTED_SHA512" ]; then
            echo "::error::Checksum mismatch for $FILENAME"
            echo "expected: $EXPECTED_SHA512"
            echo "got:      $ACTUAL_SHA512"
            rm -f "x86_64/$FILENAME"
            exit 1
          fi

      - name: Regenerate repository metadata
        if: steps.check_version.outputs.should_publish == 'true'
        run: createrepo_c x86_64/

      - name: Record published version
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          echo "${{ steps.check_version.outputs.version }}" > last_version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_version.txt
          git commit -m "Track Proton Pass ${{ steps.check_version.outputs.version }}"
          git push

      - name: Setup Pages
        if: steps.check_version.outputs.should_publish == 'true'
        uses: actions/configure-pages@v5

      - name: Build clean Pages directory
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          mkdir -p _site
          cp -r x86_64 _site/
          cp setup.sh _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        if: steps.check_version.outputs.should_publish == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        if: steps.check_version.outputs.should_publish == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
