name: Update Proton Pass RPM Repository

on:
  schedule:
    - cron: '0 0 * * *'   # every day at 00:00 UTC
  workflow_dispatch:

env:
  VERSIONS_TO_KEEP: 5   # number of releases to retain; older ones are pruned automatically

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-repo:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq createrepo-c

      - name: Fetch manifest and check for new version
        id: check_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST_URL="https://proton.me/download/PassDesktop/linux/x64/version.json"
          VERSION_DATA=$(curl -sL "$MANIFEST_URL")

          VERSION=$(echo "$VERSION_DATA" | jq -r '.Releases[0].Version')
          DOWNLOAD_URL=$(echo "$VERSION_DATA" | jq -r '.Releases[0].File[] | select(.Url | endswith(".rpm")) | .Url')
          EXPECTED_SHA512=$(echo "$VERSION_DATA" | jq -r '.Releases[0].File[] | select(.Url | endswith(".rpm")) | .Sha512CheckSum')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "::error::Could not find a .rpm entry in Proton's manifest - the API may have changed."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "expected_sha512=$EXPECTED_SHA512" >> "$GITHUB_OUTPUT"

          # Check if a GitHub Release already exists for this version
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            EXISTING="true"
          else
            EXISTING="false"
          fi
          echo "release_exists=$EXISTING" >> "$GITHUB_OUTPUT"

          if [ "$EXISTING" = "true" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Release v$VERSION already exists, nothing to do."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download new RPM and create GitHub Release
        if: steps.check_version.outputs.should_publish == 'true' && steps.check_version.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          DOWNLOAD_URL="${{ steps.check_version.outputs.download_url }}"
          EXPECTED_SHA512="${{ steps.check_version.outputs.expected_sha512 }}"
          FILENAME=$(basename "$DOWNLOAD_URL")

          echo "Downloading $FILENAME..."
          curl -sL "$DOWNLOAD_URL" -o "$FILENAME"

          ACTUAL_SHA512=$(sha512sum "$FILENAME" | awk '{print $1}')
          if [ "$ACTUAL_SHA512" != "$EXPECTED_SHA512" ]; then
            echo "::error::Checksum mismatch for $FILENAME"
            echo "expected: $EXPECTED_SHA512"
            echo "got:      $ACTUAL_SHA512"
            rm -f "$FILENAME"
            exit 1
          fi

          echo "Checksum OK. Creating GitHub Release v$VERSION..."
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Proton Pass $VERSION" \
            --notes "Automated release. Source: $DOWNLOAD_URL" \
            "$FILENAME"

      - name: Prune old releases
        if: steps.check_version.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,createdAt \
            | jq -r 'sort_by(.createdAt) | reverse | .[${{ env.VERSIONS_TO_KEEP }}:] | .[].tagName' \
            | while read TAG; do
                echo "Pruning old release $TAG..."
                gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
              done

      - name: Download all release assets and build repo
        if: steps.check_version.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p x86_64

          echo "Fetching all release tags..."
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName \
            | jq -r '.[].tagName' | while read TAG; do
              echo "Downloading assets for $TAG..."
              gh release download "$TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern "*.rpm" \
                --dir x86_64 \
                --clobber
            done

          echo "RPMs collected:"
          ls -lh x86_64/

      - name: Regenerate repository metadata
        if: steps.check_version.outputs.should_publish == 'true'
        run: createrepo_c x86_64/

      - name: Setup Pages
        if: steps.check_version.outputs.should_publish == 'true'
        uses: actions/configure-pages@v5

      - name: Build clean Pages directory
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          mkdir -p _site
          cp -r x86_64 _site/
          cp setup.sh _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        if: steps.check_version.outputs.should_publish == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        if: steps.check_version.outputs.should_publish == 'true'
        id: deployment
        uses: actions/deploy-pages@v4